name: Release

# IMPORTANT: This workflow is triggered ONLY by manual dispatch via
# the GitHub Actions UI. It is NOT triggered on tag push, schedule,
# or any other event. Publishing requires explicit human action.
#
# The workflow uses repository secrets (NPM_TOKEN, CRATES_IO_TOKEN)
# that the agent does not have access to. The maintainer adds these
# as GitHub repository secrets (Settings → Secrets and variables →
# Actions) before the first release.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.1.0)'
        required: true
        type: string
      publish_npm:
        description: 'Publish to npm?'
        required: true
        type: boolean
        default: false
      publish_crates:
        description: 'Publish to crates.io?'
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-apple-darwin
            os: macos-13
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build frontend
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile --ignore-scripts
          pnpm build

      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          mkdir -p artifacts
          cp target/${{ matrix.target }}/release/loom-lens artifacts/
          cd artifacts
          tar czf loom-lens-${{ matrix.target }}.tar.gz loom-lens

      - uses: actions/upload-artifact@v4
        with:
          name: loom-lens-${{ matrix.target }}
          path: artifacts/loom-lens-${{ matrix.target }}.tar.gz

  github-release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          generate_release_notes: true
          files: artifacts/**/*.tar.gz

  publish-npm:
    name: Publish to npm
    if: inputs.publish_npm
    needs: github-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/
      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-crates:
    name: Publish to crates.io
    if: inputs.publish_crates
    needs: github-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish
        run: cargo publish --token ${{ secrets.CRATES_IO_TOKEN }}
