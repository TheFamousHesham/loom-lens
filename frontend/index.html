<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loom Lens</title>
    <style>
      html, body, #root { height: 100%; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        background: #0e1116;
        color: #e8eaed;
        overflow: hidden;
      }
      a { color: #61afef; }
      .loom-shell {
        display: flex;
        flex-direction: column;
        height: 100%;
      }
      .loom-topbar {
        display: flex;
        align-items: center;
        gap: 1rem;
        padding: 0.6rem 1rem;
        border-bottom: 1px solid #1f242c;
        background: #161a20;
      }
      .loom-topbar h1 {
        font-size: 1rem;
        font-weight: 600;
        margin: 0;
        letter-spacing: 0.02em;
      }
      .loom-topbar .modes {
        display: flex;
        gap: 0.4rem;
        margin-left: 0.4rem;
      }
      .loom-topbar .mode {
        padding: 0.2rem 0.6rem;
        border-radius: 4px;
        background: transparent;
        color: #8a929c;
        cursor: not-allowed;
        font-size: 0.85rem;
      }
      .loom-topbar .mode.active {
        background: #2c3038;
        color: #e8eaed;
        cursor: default;
      }
      .loom-topbar .meta {
        margin-left: auto;
        font-size: 0.85rem;
        color: #8a929c;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      .loom-canvas { flex: 1; position: relative; }
      .loom-status {
        padding: 0.4rem 1rem;
        border-top: 1px solid #1f242c;
        font-size: 0.78rem;
        color: #8a929c;
        background: #161a20;
        display: flex;
        gap: 1.2rem;
      }
      .loom-empty {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        align-items: center;
        justify-content: center;
        height: 100%;
        color: #8a929c;
        font-size: 0.95rem;
        text-align: center;
        padding: 2rem;
      }
      .loom-empty code {
        background: #1f242c;
        padding: 0.15rem 0.4rem;
        border-radius: 3px;
        color: #e8eaed;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
