[tools]
rust = "1.85.0"
node = "22.11.0"
"npm:pnpm" = "9.15.0"

# Tools.
# `cargo-nextest` and `cargo-deny` are pinned (rather than "latest") because
# their newest releases require rustc 1.88+ while we pin Rust 1.85.0. Bumping
# Rust to 1.88+ is itself an architectural change — see ADR 0001 §"Refinements
# at Checkpoint 1" for the version-coupling rationale. The other three tools
# track latest because their MSRV is below our Rust pin.
"cargo:cargo-nextest" = "0.9.95"
"cargo:cargo-audit" = "latest"
"cargo:cargo-deny" = "0.16.4"
"cargo:cargo-watch" = "latest"
"cargo:sccache" = "latest"

[env]
CARGO_INSTALL_ROOT = "{{config_root}}/.cargo-bin"
CARGO_HOME = "{{config_root}}/.cargo"
RUSTC_WRAPPER = "sccache"
SCCACHE_DIR = "{{config_root}}/.sccache"

# Pinned at bootstrap. Do not modify without an ADR.
